version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stitch-db
    environment:
      POSTGRES_USER: stitch
      POSTGRES_PASSWORD: stitch_dev_password
      POSTGRES_DB: stitch
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./grant_permissions.sql:/docker-entrypoint-initdb.d/03-grant-permissions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stitch"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and sessions (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: stitch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # MinIO for file storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: stitch-storage
    environment:
      MINIO_ROOT_USER: stitch
      MINIO_ROOT_PASSWORD: stitch_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:


