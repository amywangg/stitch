name: Stitch
options:
  bundleIdPrefix: com.stitchmarker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  groupSortPosition: top

configs:
  Debug: debug
  Staging: debug
  Release: release

packages:
  ClerkiOS:
    url: https://github.com/clerk/clerk-ios
    from: 1.0.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: 5.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES
  configs:
    Staging:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG STAGING"

targets:
  Stitch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Stitch
        excludes:
          - "**/*.md"
    dependencies:
      - package: ClerkiOS
        product: ClerkKit
      - package: ClerkiOS
        product: ClerkKitUI
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
    entitlements:
      path: Stitch/Stitch.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stitchmarker.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "5"
        INFOPLIST_FILE: Stitch/Info.plist
        DEVELOPMENT_TEAM: 6K3U993582
        CODE_SIGN_STYLE: Automatic
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ENABLE_BITCODE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Stitch/Info.plist
      properties:
        CFBundleName: Stitchmarker
        CFBundleDisplayName: "Stitch"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleIconName: AppIcon
        NSCameraUsageDescription: "Stitch uses the camera to take photos of your yarn, projects, and swatches."
        NSPhotoLibraryUsageDescription: "Stitch accesses your photo library to add images of your projects and yarn."
        NSMicrophoneUsageDescription: "Stitch uses the microphone for hands-free voice counting while you knit."
        NSSpeechRecognitionUsageDescription: "Stitch uses speech recognition for hands-free voice commands during counting."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.stitchmarker.app
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: YES
    scheme:
      testTargets: []
      gatherCoverageData: false

schemes:
  Stitch:
    build:
      targets:
        Stitch: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  Stitch Staging:
    build:
      targets:
        Stitch: all
    run:
      config: Staging
    profile:
      config: Release
    analyze:
      config: Staging
    archive:
      config: Release
